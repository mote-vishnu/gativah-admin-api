spring.application.name=gativah-admin-api
spring.profiles.default=dev

# ── Shared Postgres with pacegrit-service ─────────────────────
# The admin API reads the live platform tables directly and owns its own
# admin_* tables. It is NOT the schema owner: pacegrit-service runs all Flyway
# migrations; this service runs validate-only and never migrates.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/pacegrit_app_dev}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}

spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jackson.time-zone=UTC

# ── Server ────────────────────────────────────────────────────
# 8085 — clear of pacegrit-service (8081) and the Angular dev server (4200).
server.port=${SERVER_PORT:8085}

# ── CORS — the Angular admin SPA origin(s) ────────────────────
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# ── Staff (admin) JWT — distinct secret & audience from consumer tokens ──
# Dev fallback is base64; OVERRIDE in every real environment.
admin.jwt.secret=${ADMIN_JWT_SECRET:ZGV2LW9ubHktZ2F0aXZhaC1hZG1pbi1zZWNyZXQtY2hhbmdlLW1lLTMyYnl0ZXMtbWluLWxlbmd0aA==}
admin.jwt.audience=${ADMIN_JWT_AUDIENCE:gativah-admin}
admin.jwt.expiration-ms=${ADMIN_JWT_EXPIRATION_MS:1800000}

# ── Internal hooks into pacegrit-service (/internal/admin/**) ──
# Side-effectful actions (ban, takedown, comp entitlement) are delegated so the
# real domain logic runs. Guarded by a shared service token + network policy.
pacegrit.internal.base-url=${PACEGRIT_INTERNAL_BASE_URL:http://localhost:8081}
pacegrit.internal.service-token=${PACEGRIT_INTERNAL_SERVICE_TOKEN:dev-internal-service-token-change-me}

# ── OpenAPI / Swagger ─────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# ── Logging ───────────────────────────────────────────────────
# Override per-env with LOG_* vars. Security DEBUG prints the token's
# authorities + each authorization decision — use it to see why a call 403s.
logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.com.gativah.admin=${LOG_LEVEL_APP:DEBUG}
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:DEBUG}
logging.level.org.springframework.web=${LOG_LEVEL_WEB:INFO}
# Console pattern with logger name for readable, greppable output.
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level [%logger{36}] %msg%n
